name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag å bygge (f.eks. v2.1.1)'
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-tags: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Typst
        uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Download Libertinus fonts
        run: |
          mkdir -p typst-fonts
          URL=$(curl -sL https://api.github.com/repos/alerque/libertinus/releases/latest \
            | grep -Eo '"browser_download_url": "[^"]+\.zip"' \
            | head -1 | cut -d'"' -f4)
          echo "Henter Libertinus fra $URL"
          curl -sL -o /tmp/libertinus.zip "$URL"
          unzip -q /tmp/libertinus.zip -d /tmp/libertinus
          find /tmp/libertinus -name "*.otf" -exec cp {} typst-fonts/ \;
          ls typst-fonts/

      - name: Publish (single-file self-contained win-x64)
        run: |
          dotnet publish PrintFraItslearning.csproj \
            -c Release \
            -r win-x64 \
            -p:PublishSingleFile=true \
            -p:SelfContained=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -o publish

      - name: Compile documentation PDF
        run: |
          typst compile --font-path typst-fonts docs/dokumentasjon.typ publish/dokumentasjon.pdf

      - name: Generate SHA256 checksums
        run: |
          cd publish
          sha256sum PrintFraItslearning.exe dokumentasjon.pdf > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            publish/PrintFraItslearning.exe
            publish/dokumentasjon.pdf

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          git fetch --tags --force origin >/dev/null 2>&1 || true
          NOTES=$(git for-each-ref "refs/tags/$TAG" --format='%(contents)')
          if [ -z "$NOTES" ]; then
            NOTES="$TAG"
          fi
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" --repo "$GITHUB_REPOSITORY"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" \
            publish/PrintFraItslearning.exe \
            publish/dokumentasjon.pdf \
            publish/SHA256SUMS \
            --clobber --repo "$GITHUB_REPOSITORY"
